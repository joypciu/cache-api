name: Cleanup branches on PR close

on:
  pull_request:
    types:
      - closed   # triggers on both merged and declined PRs

jobs:
  delete-branch:
    runs-on: ubuntu-latest
    # Never delete main, develop, or any protected base branch
    if: github.head_ref != 'main' && github.head_ref != 'develop'
    steps:
      - name: Delete head branch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = context.payload.pull_request.head.ref;
            const owner  = context.repo.owner;
            const repo   = context.repo.repo;

            console.log(`Deleting branch: ${branch}`);
            try {
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `heads/${branch}`,
              });
              console.log(`✅ Branch '${branch}' deleted.`);
            } catch (err) {
              if (err.status === 422) {
                console.log(`ℹ️ Branch '${branch}' already deleted.`);
              } else {
                throw err;
              }
            }
