name: Test Email Alert (delete after confirming)

on:
  workflow_dispatch: # run manually from Actions tab

jobs:
  test-email:
    runs-on: ubuntu-latest
    steps:
      - name: Send test email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_SENDER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: ${{ secrets.ADMIN_EMAIL }}
          from: Cache API CI <${{ secrets.GMAIL_SENDER }}>
          subject: "✅ TEST — Smoke test email alert is working (cache-api)"
          body: |
            This is a test email to confirm the GitHub Actions email alert
            is correctly configured for cache-api.

            If you received this, the following secrets are working:
              ✅ GMAIL_SENDER
              ✅ GMAIL_APP_PASSWORD
              ✅ ADMIN_EMAIL

            You can now delete the workflow file:
            .github/workflows/test-email-alert.yml

            Repository : ${{ github.repository }}
            Triggered by : ${{ github.actor }}
            Run URL : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
